{% macro gov_seal(size=120) %}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="{{ size }}" height="{{ size }}">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#c5a44e" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#c5a44e" stroke-width="1"/>
  <!-- Star ring (12 stars) -->
  {% for i in range(12) %}
  <text x="100" y="22" text-anchor="middle" font-size="9" fill="#c5a44e"
        transform="rotate({{ i * 30 }}, 100, 100)">&#9733;</text>
  {% endfor %}
  <!-- Inner shield -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#c5a44e" stroke-width="1.5"/>
  <!-- Eagle body simplified -->
  <g transform="translate(100,78)" fill="#c5a44e">
    <!-- Wings -->
    <path d="M0,-18 L-32,8 L-28,12 L-18,4 L-24,16 L-20,18 L-10,6 L-14,20 L-10,20 L-4,8 L0,12 Z" opacity="0.9"/>
    <path d="M0,-18 L32,8 L28,12 L18,4 L24,16 L20,18 L10,6 L14,20 L10,20 L4,8 L0,12 Z" opacity="0.9"/>
    <!-- Body -->
    <ellipse cx="0" cy="6" rx="8" ry="12" fill="#c5a44e"/>
    <!-- Head -->
    <circle cx="0" cy="-10" r="6" fill="#c5a44e"/>
    <!-- Beak -->
    <polygon points="0,-12 4,-8 0,-6" fill="#001529"/>
  </g>
  <!-- Shield on eagle -->
  <g transform="translate(100,86)">
    <rect x="-7" y="-6" width="14" height="16" rx="0" fill="#002147" stroke="#c5a44e" stroke-width="0.8"/>
    <line x1="-7" y1="-1" x2="7" y2="-1" stroke="#c5a44e" stroke-width="0.5"/>
    <line x1="-7" y1="4" x2="7" y2="4" stroke="#c5a44e" stroke-width="0.5"/>
    <line x1="0" y1="-6" x2="0" y2="10" stroke="#c5a44e" stroke-width="0.5"/>
  </g>
  <!-- Banner -->
  <path d="M60,140 Q100,130 140,140 Q100,150 60,140 Z" fill="#c5a44e" opacity="0.3"/>
  <!-- Text ring -->
  <defs>
    <path id="topArc" d="M 30,100 A 70,70 0 0,1 170,100"/>
    <path id="bottomArc" d="M 170,110 A 70,70 0 0,1 30,110"/>
  </defs>
  <text font-size="9" fill="#c5a44e" font-family="Georgia, serif" letter-spacing="3" font-weight="700">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">UNITED STATES</textPath>
  </text>
  <text font-size="8.5" fill="#c5a44e" font-family="Georgia, serif" letter-spacing="2.5" font-weight="700">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">GOVERNMENT</textPath>
  </text>
</svg>
{% endmacro %}

{% macro gov_seal_mini(size=36) %}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="{{ size }}" height="{{ size }}" class="seal-mini">
  <circle cx="100" cy="100" r="96" fill="none" stroke="#c5a44e" stroke-width="4"/>
  <circle cx="100" cy="100" r="68" fill="none" stroke="#c5a44e" stroke-width="2.5"/>
  <g transform="translate(100,85)" fill="#c5a44e">
    <path d="M0,-22 L-36,10 L-30,14 L-20,4 L-26,18 L-22,20 L-12,6 L-16,22 L-12,22 L-4,8 L0,14 Z"/>
    <path d="M0,-22 L36,10 L30,14 L20,4 L26,18 L22,20 L12,6 L16,22 L12,22 L4,8 L0,14 Z"/>
    <ellipse cx="0" cy="6" rx="10" ry="14"/>
    <circle cx="0" cy="-12" r="8"/>
  </g>
  <text font-size="12" fill="#c5a44e" font-family="Georgia, serif" letter-spacing="4" font-weight="700" text-anchor="middle">
    <textPath href="#sealTopArc" startOffset="50%">US</textPath>
  </text>
  <defs><path id="sealTopArc" d="M 50,100 A 50,50 0 0,1 150,100"/></defs>
</svg>
{% endmacro %}
